cases:
  - id: save_goal_explicit
    description: User expresses a clear health goal
    input: "My goal is to lower my triglycerides"
    expected_tools: ["save_goal"]

  - id: save_goal_vague
    description: User expresses a vague health intention
    input: "I want to eat healthier, please save that as my goal"
    expected_tools: ["save_goal"]

  - id: save_restriction_allergy
    description: User mentions an allergy
    input: "I'm allergic to peanuts"
    expected_tools: ["save_restriction"]

  - id: save_restriction_diet
    description: User mentions a diet preference
    input: "I don't eat meat, I'm vegetarian"
    expected_tools: ["save_restriction"]

  - id: save_health_context
    description: User shares physical stats
    input: "I weigh 80kg and I'm 180cm tall"
    expected_tools: ["save_health_context"]

  - id: fetch_lab_specific
    description: User asks about specific lab marker
    input: "What was my cholesterol level in my last lab results?"
    expected_tools: ["fetch_lab_results", "fetch_user_context"]

  - id: fetch_context_broad
    description: User asks broad health question about their data
    input: "Show me all my saved health data — goals, restrictions, everything"
    expected_tools: ["fetch_user_context"]

  - id: ask_recommendation
    description: User asks what to eat
    input: "Based on my health profile, what should I eat for breakfast?"
    expected_tools: ["ask_recommendation", "fetch_user_context"]

  - id: analyze_food_text
    description: User asks about specific food nutritional content
    input: "Analyze pizza for me — what are the nutritional values?"
    expected_tools: ["analyze_food"]

  - id: log_meal_text
    description: User describes what they ate
    input: "I had two eggs and toast for breakfast, please log it"
    expected_tools: ["log_meal"]

  - id: greeting_no_tool
    description: Simple greeting
    input: "Hello!"
    expected_tools: []
    forbidden_tools: ["save_goal", "save_restriction", "log_meal"]

  - id: thanks_no_tool
    description: Closure message
    input: "Thanks, that's helpful!"
    expected_tools: []

  - id: off_topic_no_tool
    description: Off-topic question
    input: "What's the weather like today?"
    expected_tools: []
    forbidden_tools: ["ask_recommendation", "analyze_food"]

  - id: multi_goal_restriction
    description: User shares both goal and restriction
    input: "Save this: I'm vegan and my goal is to lose weight"
    expected_tools: ["save_goal", "save_restriction"]

  - id: nutrition_advice_specific
    description: User asks about foods for a condition
    input: "What foods help lower cholesterol? Give me recommendations"
    expected_tools: ["ask_recommendation", "fetch_user_context"]
